openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: storyboard
    description: DreamFrame AI storyboard operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /storyboard/generate-video:
    post:
      operationId: generateSceneVideo
      tags: [storyboard]
      summary: Generate an AI video clip for a storyboard scene
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VideoGenerationRequest"
      responses:
        "200":
          description: Video generation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoGenerationResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /storyboard/generate-image:
    post:
      operationId: generateSceneImage
      tags: [storyboard]
      summary: Generate an AI image for a storyboard scene
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImageGenerationRequest"
      responses:
        "200":
          description: Image generation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageGenerationResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /storyboard/assets:
    get:
      operationId: getStoryboardAssets
      tags: [storyboard]
      summary: Get all persisted assets for a storyboard
      parameters:
        - name: storyboardId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Persisted scene assets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SceneAssetList"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /storyboard/batch-status:
    get:
      operationId: getBatchStatus
      tags: [storyboard]
      summary: Get persisted batch queue status
      parameters:
        - name: storyboardId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Batch queue state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchQueueState"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /storyboard/movie-export:
    post:
      operationId: createMovieExport
      tags: [storyboard]
      summary: Create a movie export from storyboard scenes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MovieExportRequest"
      responses:
        "200":
          description: Export created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieExport"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /storyboard/movie-export/{exportId}:
    get:
      operationId: getMovieExport
      tags: [storyboard]
      summary: Get movie export status and result by ID
      parameters:
        - name: exportId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Export status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieExport"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /storyboard/analyze:
    post:
      operationId: analyzeStory
      tags: [storyboard]
      summary: Analyze a story and generate storyboard scenes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoryInput"
      responses:
        "200":
          description: Storyboard with scenes and characters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Storyboard"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /storyboard/batch-generate-videos:
    post:
      operationId: batchGenerateVideos
      tags: [storyboard]
      summary: Batch generate cinematic video clips for all storyboard scenes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchVideoGenerationRequest"
      responses:
        "200":
          description: Batch video generation status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchVideoGenerationStatus"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /storyboard/batch-generate-videos/status:
    get:
      operationId: getBatchVideoStatus
      tags: [storyboard]
      summary: Get real-time in-memory batch video generation status
      responses:
        "200":
          description: Live batch status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchVideoGenerationStatus"

  /storyboard/batch-generate-videos/pause:
    post:
      operationId: pauseBatchVideoGeneration
      tags: [storyboard]
      summary: Pause the active batch video generation queue
      responses:
        "200":
          description: Pause acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchControlResponse"

  /storyboard/batch-generate-videos/resume:
    post:
      operationId: resumeBatchVideoGeneration
      tags: [storyboard]
      summary: Resume a paused batch video generation queue
      responses:
        "200":
          description: Resume acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchControlResponse"

  /storyboard/batch-generate-videos/cancel:
    post:
      operationId: cancelBatchVideoGeneration
      tags: [storyboard]
      summary: Cancel the active batch video generation queue
      responses:
        "200":
          description: Cancel acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchControlResponse"

  /storyboard/batch-generate-images:
    post:
      operationId: batchGenerateImages
      tags: [storyboard]
      summary: Batch generate images for all storyboard scenes sequentially with continuity engine
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchImageGenerationRequest"
      responses:
        "200":
          description: Batch image generation status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchImageGenerationStatus"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /storyboard/batch-generate-images/status:
    get:
      operationId: getBatchImageStatus
      tags: [storyboard]
      summary: Get real-time in-memory batch image generation status
      responses:
        "200":
          description: Live batch image status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchImageGenerationStatus"

  /storyboard/batch-generate-images/cancel:
    post:
      operationId: cancelBatchImageGeneration
      tags: [storyboard]
      summary: Cancel the active batch image generation queue
      responses:
        "200":
          description: Cancel acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchControlResponse"

  /storyboard/analytics:
    get:
      operationId: getProductionAnalytics
      tags: [storyboard]
      summary: Get production analytics for a storyboard
      parameters:
        - name: storyboardId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Production analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductionAnalytics"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    StoryInput:
      type: object
      properties:
        story:
          type: string
          minLength: 10
        outputLanguage:
          type: string
          enum: [en, si, ta]
          default: en
      required:
        - story

    # ─── Scene Type ────────────────────────────────────────────────────────────
    SceneType:
      type: string
      enum: [Present, Flashback, Dream, Imagination]

    # ─── Character Schemas ─────────────────────────────────────────────────────
    CharacterProfile:
      type: object
      properties:
        characterId:
          type: string
          description: English lowercase hyphenated slug, unique across all characters
        name:
          type: string
          description: Character name in the output language
        species:
          type: string
          description: Species or archetype in the output language
        appearance:
          type: string
          description: 3-4 sentences describing the character visually
        clothing:
          type: string
          description: Garments, accessories, footwear in the output language. "—" if none.
        personality:
          type: string
          description: 2-3 sentences covering motivation, baseline, and behavioral tell
        distinctiveFeatures:
          type: string
          description: 2-4 precise, artist-reproducible visual markers
        voiceStyle:
          type: string
          description: "English only. One sentence: pitch, tempo, texture, accent, delivery style."
      required:
        - characterId
        - name
        - species
        - appearance
        - personality
        - distinctiveFeatures

    # ─── Story Layer Schemas ───────────────────────────────────────────────────
    InternalThought:
      type: object
      properties:
        character:
          type: string
        thought:
          type: string
      required:
        - character
        - thought

    DialogueLine:
      type: object
      description: A single spoken line with full voice performance metadata
      properties:
        character:
          type: string
          description: Exact character name from profile
        line:
          type: string
          description: Spoken words only, no quotation marks
        vocalEmotion:
          type: string
          description: "English only. The emotional quality of the voice delivery (e.g. sadness, joy, anger, fear, contempt, relief, determination)"
        vocalIntensity:
          type: number
          minimum: 0
          maximum: 1
          description: "Float 0.00–1.00. 0.90–1.00 = peak intensity, 0.60–0.89 = elevated, 0.30–0.59 = moderate, 0.00–0.29 = subdued"
        speechSpeed:
          type: string
          enum: [slow, normal, fast]
          description: "English only. Pace of delivery."
        pauseTiming:
          type: string
          description: "English only. Pause quality before or within the line (e.g. dramatic pause, hesitant, no pause, long silence before)"
        whisperDetection:
          type: boolean
          description: True if the line is delivered as a whisper
        shoutDetection:
          type: boolean
          description: True if the line is delivered as a shout or raised voice
      required:
        - character
        - line

    InternalMonologueLine:
      type: object
      properties:
        character:
          type: string
          description: Exact character name from profile
        monologue:
          type: string
          description: Extended inner voice passage, may be fragmented
      required:
        - character
        - monologue

    CharacterAction:
      type: object
      properties:
        character:
          type: string
          description: Named character only — never "Narrator"
        action:
          type: string
          description: Concise present-tense physical action
      required:
        - character
        - action

    CharacterEmotion:
      type: object
      properties:
        character:
          type: string
          description: Exact character name from profile
        emotion:
          type: string
          description: Short, precise emotional state label
        confidence:
          type: number
          minimum: 0
          maximum: 1
          description: "Float 0.00–1.00: 0.90–1.00 explicit, 0.60–0.89 implied, 0.30–0.59 inferred"
      required:
        - character
        - emotion
        - confidence

    # ─── Audio Schema ──────────────────────────────────────────────────────────
    SceneAudio:
      type: object
      properties:
        backgroundAmbience:
          type: array
          items:
            type: string
          description: 2-5 continuous environmental sound descriptions (English only)
        backgroundMusic:
          type: string
          description: Tempo, instrumentation, emotional tone, genre reference (English only)
        soundEffects:
          type: array
          items:
            type: string
          description: 1-6 event-triggered sound effects (English only)
      required:
        - backgroundAmbience
        - backgroundMusic
        - soundEffects

    # ─── Continuity Schema ─────────────────────────────────────────────────────
    ContinuityStatus:
      type: string
      enum: [Pass, Warning, Fail]

    SceneContinuityCheck:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/ContinuityStatus"
        issues:
          type: array
          items:
            type: string
          description: List of continuity issues. Empty if status is Pass.
      required:
        - status
        - issues

    # ─── Scene Memory Engine ───────────────────────────────────────────────────
    SceneContinuityMemory:
      type: object
      description: Persistent state memory tracked from previous scenes for continuity enforcement
      properties:
        clothingState:
          type: array
          items:
            type: string
          description: "English only. Current clothing/costume state of each character present (e.g. 'Kael: torn jacket, missing left glove')"
        weatherState:
          type: string
          description: "English only. Current weather conditions carried from previous scenes"
        environmentState:
          type: string
          description: "English only. Current environment and location state"
        objectsPresent:
          type: array
          items:
            type: string
          description: "English only. Key props and objects present and their state"
        injuryState:
          type: array
          items:
            type: string
          description: "English only. Any injuries or physical damage carried from prior scenes"
        emotionalCarryOver:
          type: array
          items:
            type: string
          description: "English only. Emotional states or unresolved tensions carried into this scene"
        lightingState:
          type: string
          description: "English only. Current ambient lighting conditions"
        timeOfDay:
          type: string
          description: "English only. Time of day continuity (e.g. dusk, night, early morning)"
        continuityWarnings:
          type: array
          items:
            type: string
          description: "English only. Specific continuity violations or risks detected in this scene"
        continuityResolutionSuggestions:
          type: array
          items:
            type: string
          description: "English only. Director suggestions to resolve or address continuity warnings"
      required:
        - clothingState
        - weatherState
        - environmentState
        - objectsPresent
        - injuryState
        - emotionalCarryOver
        - lightingState
        - timeOfDay
        - continuityWarnings
        - continuityResolutionSuggestions

    # ─── Cinematic Camera System ───────────────────────────────────────────────
    CinematicCamera:
      type: object
      description: Structured cinematic camera direction for the scene (English only)
      properties:
        shotType:
          type: string
          description: "Primary shot type: Close-up | Medium Shot | Wide Shot | Extreme Wide Shot | POV Shot | Tracking Shot"
        cameraAngle:
          type: string
          description: "Camera angle: Low Angle | High Angle | Eye Level | Dutch Angle | Over-the-Shoulder"
        cameraMovement:
          type: string
          description: "Camera movement: Static | Dolly In | Dolly Out | Crane Up | Handheld | Tracking | Orbit"
        lensStyle:
          type: string
          description: "Lens style: 35mm cinematic | 50mm portrait | ultra wide | telephoto compression"
        framingStyle:
          type: string
          description: "English only. Framing composition note (e.g. rule of thirds, centered symmetry, negative space)"
        lightingStyle:
          type: string
          description: "English only. Lighting mood and direction (e.g. cinematic glow, storm shadows, warm sunrise, moody contrast)"
        pacingStyle:
          type: string
          description: "English only. Editorial pacing feel (e.g. emotional slow pacing, tension pacing, dream pacing)"
      required:
        - shotType
        - cameraAngle
        - cameraMovement
        - lensStyle
        - framingStyle
        - lightingStyle
        - pacingStyle

    # ─── Storyboard Shotlist Engine ────────────────────────────────────────────
    ShotListItem:
      type: object
      description: A single production shot entry in the scene shotlist (English only)
      properties:
        shotNumber:
          type: integer
          description: Shot number within the scene, starting from 1
        shotDescription:
          type: string
          description: "English only. Concise visual description of what the camera captures"
        shotPurpose:
          type: string
          description: "English only. Narrative or emotional purpose of this shot"
        estimatedDuration:
          type: string
          description: "English only. Estimated screen time (e.g. 3 seconds, 8–12 seconds)"
        transitionType:
          type: string
          description: "Transition into the next shot: Fade In | Fade Out | Dissolve | Match Cut | Hard Cut | Iris Transition | Dream Ripple"
      required:
        - shotNumber
        - shotDescription
        - shotPurpose
        - estimatedDuration
        - transitionType

    # ─── Cinematic Tension Analysis ────────────────────────────────────────────
    TensionAnalysis:
      type: object
      description: Emotional and cinematic tension tracking for the scene (English only)
      properties:
        tensionCurve:
          type: string
          description: "English only. Description of the tension arc within this scene (e.g. builds steadily, sharp spike at midpoint, slow release)"
        emotionalIntensity:
          type: number
          minimum: 0
          maximum: 1
          description: "Float 0.00–1.00. Overall emotional intensity of the scene relative to the full story"
        pacingBalance:
          type: string
          description: "English only. Editorial pacing assessment (e.g. well-balanced, front-loaded tension, needs breathing room)"
      required:
        - tensionCurve
        - emotionalIntensity
        - pacingBalance

    # ─── Production Assessment Schemas ────────────────────────────────────────
    MovieReadinessReport:
      type: object
      properties:
        strengths:
          type: array
          items:
            type: string
          description: 2-5 specific strengths of this story as a film project
        weaknesses:
          type: array
          items:
            type: string
          description: 1-4 specific weaknesses or underdeveloped elements
        missingElements:
          type: array
          items:
            type: string
          description: 0-3 story elements that would strengthen the film but are absent
        productionNotes:
          type: string
          description: English only. 2-4 sentence paragraph of practical production advice.
      required:
        - strengths
        - weaknesses
        - missingElements
        - productionNotes

    # ─── Export Preparation System ─────────────────────────────────────────────
    ExportReadiness:
      type: object
      description: Pipeline readiness assessment for downstream production export
      properties:
        screenplayReady:
          type: boolean
          description: True if dialogue, narration, and scene structure are complete enough for screenplay formatting
        storyboardReady:
          type: boolean
          description: True if visual prompts and shot lists are complete enough for storyboard rendering
        animationPipelineReady:
          type: boolean
          description: True if character profiles and visual prompts meet animation pre-production standards
        voicePipelineReady:
          type: boolean
          description: True if dialogue and voice metadata are complete enough for voice direction and dubbing
        editingPipelineReady:
          type: boolean
          description: True if shotlists and transition types are complete enough for editorial planning
      required:
        - screenplayReady
        - storyboardReady
        - animationPipelineReady
        - voicePipelineReady
        - editingPipelineReady

    # ─── Scene Image Prompt ────────────────────────────────────────────────────
    SceneImagePrompt:
      type: object
      description: Platform-neutral image generation prompt for this scene (all fields English only)
      properties:
        sceneImagePrompt:
          type: string
          description: "English only. Full platform-neutral image prompt (80-150 words) compatible with Midjourney, Stable Diffusion, DALL-E, Flux, Leonardo AI, Runway, Kling, Veo."
        colorPalette:
          type: string
          description: "English only. Specific color palette for this scene"
        environmentDetail:
          type: string
          description: "English only. Detailed environment and setting description"
        characterPositioning:
          type: string
          description: "English only. Exact character positions, poses, and spatial relationships"
        facialExpressionDetail:
          type: string
          description: "English only. Per-character facial expression descriptions"
        cinematicMood:
          type: string
          description: "English only. Compound phrase capturing the scene's cinematic atmosphere"
        visualEffects:
          type: string
          description: "English only. Specific visual effects or post-processing notes"
        renderStyle:
          type: string
          description: "English only. Preferred render style (e.g. photorealistic, cel-shaded, watercolor)"
        animationStyle:
          type: string
          description: "English only. Animation style if applicable"
        visualEngine:
          type: string
          description: "English only. Declared visual engine for this scene (PresentEngine, FlashbackEngine, DreamEngine, ImaginationEngine)"
        characterVisualContinuity:
          type: string
          description: "English only. Per-character visual continuity state summary carried from memory"
        imageGenerationScore:
          type: number
          minimum: 0
          maximum: 100
          description: "Float 0-100. Estimated suitability score for AI image generation (detail, clarity, prompt quality)"
      required:
        - sceneImagePrompt
        - colorPalette
        - environmentDetail
        - characterPositioning
        - facialExpressionDetail
        - cinematicMood
        - visualEffects
        - renderStyle
        - animationStyle
        - visualEngine
        - characterVisualContinuity
        - imageGenerationScore

    # ─── Storyboard Frame Metadata ─────────────────────────────────────────────
    StoryboardFrameMetadata:
      type: object
      description: Technical frame-level metadata for storyboard rendering (all fields English only)
      properties:
        aspectRatio:
          type: string
          description: "English only. Frame aspect ratio (e.g. 16:9 Cinematic, 2.39:1 Anamorphic)"
        focalLength:
          type: string
          description: "English only. Simulated focal length (e.g. 35mm, 85mm)"
        depthOfField:
          type: string
          description: "English only. Depth of field description"
        lensStyleFrame:
          type: string
          description: "English only. Lens style for this frame"
        compositionNotes:
          type: string
          description: "English only. Composition-specific direction for frame layout"
      required:
        - aspectRatio
        - focalLength
        - depthOfField
        - lensStyleFrame
        - compositionNotes

    # ─── Visual Production Report ───────────────────────────────────────────────
    VisualProductionReport:
      type: object
      description: Cross-scene visual production assessment (all fields English only)
      properties:
        strongestVisualScenes:
          type: array
          items:
            type: integer
          description: "English only. Scene numbers with the highest image generation score"
        weakestVisualScenes:
          type: array
          items:
            type: integer
          description: "English only. Scene numbers needing the most visual improvement"
        consistencyRisks:
          type: array
          items:
            type: string
          description: "English only. Cross-scene visual consistency risks"
        animationComplexity:
          type: string
          description: "English only. Overall animation complexity assessment"
        renderingDifficulty:
          type: string
          description: "English only. Estimated rendering difficulty"
        cinematicStrengths:
          type: array
          items:
            type: string
          description: "English only. Strong cinematic elements across all scenes"
      required:
        - strongestVisualScenes
        - weakestVisualScenes
        - consistencyRisks
        - animationComplexity
        - renderingDifficulty
        - cinematicStrengths

    # ─── Scene Schema ──────────────────────────────────────────────────────────
    Scene:
      type: object
      properties:
        sceneNumber:
          type: integer
          description: Sequential scene number starting from 1
        sceneType:
          $ref: "#/components/schemas/SceneType"
        title:
          type: string
          description: Short scene title in the output language
        setting:
          type: string
          description: Where and when the scene takes place in the output language
        narration:
          type: string
          description: Narrator's voice-over or descriptive narration in the output language. Empty string if none.
        dialogue:
          type: array
          items:
            $ref: "#/components/schemas/DialogueLine"
        internalThoughts:
          type: array
          items:
            $ref: "#/components/schemas/InternalThought"
        internalMonologue:
          type: array
          items:
            $ref: "#/components/schemas/InternalMonologueLine"
        characterActions:
          type: array
          items:
            $ref: "#/components/schemas/CharacterAction"
        characterEmotions:
          type: array
          items:
            $ref: "#/components/schemas/CharacterEmotion"
        audio:
          $ref: "#/components/schemas/SceneAudio"
        continuityCheck:
          $ref: "#/components/schemas/SceneContinuityCheck"
        cinematicCamera:
          $ref: "#/components/schemas/CinematicCamera"
        shotList:
          type: array
          items:
            $ref: "#/components/schemas/ShotListItem"
          description: Ordered list of shots for this scene
        tensionAnalysis:
          $ref: "#/components/schemas/TensionAnalysis"
        continuityMemory:
          $ref: "#/components/schemas/SceneContinuityMemory"
        exportReadiness:
          $ref: "#/components/schemas/ExportReadiness"
        sceneImagePrompt:
          $ref: "#/components/schemas/SceneImagePrompt"
        storyboardFrameMetadata:
          $ref: "#/components/schemas/StoryboardFrameMetadata"
        directorNote:
          type: string
          description: Director's note in the output language. May be empty.
        flashbackIndicator:
          type: string
          description: What triggers this flashback (present only when sceneType is Flashback)
        transitionIn:
          type: string
          description: How this non-present scene begins (present only for non-Present scenes)
        returnToPresent:
          type: string
          description: How the scene ends and returns to present (present only for non-Present scenes)
        dreamVisualStyle:
          type: string
          description: Visual style for dream sequences (present only when sceneType is Dream)
        dreamAudioStyle:
          type: string
          description: Audio style for dream sequences (present only when sceneType is Dream)
        flashbackVisualStyle:
          type: string
          description: Visual style for flashback sequences (present only when sceneType is Flashback)
        flashbackAudioStyle:
          type: string
          description: Audio style for flashback sequences (present only when sceneType is Flashback)
      required:
        - sceneNumber
        - sceneType
        - title
        - setting
        - narration
        - dialogue
        - internalThoughts
        - internalMonologue
        - characterActions
        - characterEmotions
        - audio
        - continuityCheck
        - cinematicCamera
        - shotList
        - tensionAnalysis
        - continuityMemory
        - exportReadiness
        - sceneImagePrompt
        - storyboardFrameMetadata
        - directorNote

    # ─── Storyboard Schema ─────────────────────────────────────────────────────
    Storyboard:
      type: object
      properties:
        storyboardId:
          type: string
          description: Unique identifier for this storyboard session
        title:
          type: string
          description: Story title in the output language
        genre:
          type: string
          description: Story genre in the output language
        logline:
          type: string
          description: One-sentence story summary in the output language
        characters:
          type: array
          items:
            $ref: "#/components/schemas/CharacterProfile"
          description: All character profiles
        scenes:
          type: array
          items:
            $ref: "#/components/schemas/Scene"
          description: All story scenes
        productionScore:
          type: number
          minimum: 0
          maximum: 100
          description: Overall production readiness score (0-100)
        movieReadinessReport:
          $ref: "#/components/schemas/MovieReadinessReport"
        visualProductionReport:
          $ref: "#/components/schemas/VisualProductionReport"
      required:
        - storyboardId
        - title
        - genre
        - logline
        - characters
        - scenes
        - productionScore
        - movieReadinessReport
        - visualProductionReport

    # ─── Video Generation Schemas ──────────────────────────────────────────────
    VideoProvider:
      type: string
      enum: [runway, kling, luma, pika, haiper, stability, pixverse]
      description: AI video generation provider

    VideoGenerationRequest:
      type: object
      description: Request to generate an AI video clip for a storyboard scene
      properties:
        storyboardId:
          type: string
          description: Storyboard identifier for asset persistence
        sceneNumber:
          type: integer
          description: Scene number to generate video for
        videoPrompt:
          type: string
          description: Base video generation prompt
        provider:
          $ref: "#/components/schemas/VideoProvider"
        imageUrl:
          type: string
          description: Optional reference image URL for image-to-video generation
        duration:
          type: integer
          enum: [5, 10]
          default: 5
          description: Clip duration in seconds
        characterProfiles:
          type: array
          items:
            $ref: "#/components/schemas/CharacterProfile"
          description: Character profiles for visual continuity
        characterVisualContinuity:
          type: string
          description: Per-character visual continuity state
        cameraMovement:
          type: string
          description: Camera movement from CinematicCamera
        cinematicMood:
          type: string
        lightingStyle:
          type: string
        animationStyle:
          type: string
        dominantEmotion:
          type: string
        emotionalIntensity:
          type: number
          minimum: 0
          maximum: 1
        shotType:
          type: string
        pacingStyle:
          type: string
        characterMovements:
          type: array
          items:
            type: string
        environmentalMotion:
          type: string
        cinematicTransition:
          type: string
        clothingState:
          type: array
          items:
            type: string
        lightingState:
          type: string
        environmentState:
          type: string
        emotionalCarryOver:
          type: array
          items:
            type: string
      required:
        - sceneNumber
        - videoPrompt

    VideoGenerationResult:
      type: object
      description: Result of a video generation request
      properties:
        videoStatus:
          type: string
          enum: [success, error, processing]
          description: Generation status
        videoUrl:
          type: string
          description: URL of the generated video (present when videoStatus is success)
        videoProvider:
          $ref: "#/components/schemas/VideoProvider"
        videoDuration:
          type: number
          description: Actual clip duration in seconds
        generationTime:
          type: number
          description: Time taken to generate the video in seconds
        generationProgress:
          type: number
          minimum: 0
          maximum: 100
          description: Generation progress percentage (0-100)
        generationError:
          type: string
          description: Error message (present when videoStatus is error)
      required:
        - videoStatus
        - videoProvider
        - videoDuration
        - generationTime
        - generationProgress

    # ─── Batch Video Generation Schemas ─────────────────────────────────────────
    BatchVideoGenerationRequest:
      type: object
      description: Request to batch generate videos for all storyboard scenes
      properties:
        storyboardId:
          type: string
          description: Storyboard identifier for asset persistence
        scenes:
          type: array
          items:
            type: object
            properties:
              sceneNumber:
                type: integer
              videoPrompt:
                type: string
              imageUrl:
                type: string
              characterProfiles:
                type: array
                items:
                  $ref: "#/components/schemas/CharacterProfile"
              characterVisualContinuity:
                type: string
              cameraMovement:
                type: string
              cinematicMood:
                type: string
              lightingStyle:
                type: string
              animationStyle:
                type: string
              dominantEmotion:
                type: string
              emotionalIntensity:
                type: number
              shotType:
                type: string
              pacingStyle:
                type: string
              characterMovements:
                type: array
                items:
                  type: string
              environmentalMotion:
                type: string
              cinematicTransition:
                type: string
              clothingState:
                type: array
                items:
                  type: string
              lightingState:
                type: string
              environmentState:
                type: string
              emotionalCarryOver:
                type: array
                items:
                  type: string
              previousCameraMovement:
                type: string
              previousEmotionalState:
                type: string
              previousVisualPalette:
                type: string
              previousEnvironmentState:
                type: string
              transitionType:
                type: string
                enum: [fade, dissolve, whip_pan, cinematic_cut, dream_dissolve, flashback_blur, match_cut]
            required:
              - sceneNumber
              - videoPrompt
          description: Array of scene data for sequential generation
        provider:
          $ref: "#/components/schemas/VideoProvider"
        duration:
          type: integer
          enum: [5, 10]
          default: 5
      required:
        - scenes

    BatchVideoGenerationStatus:
      type: object
      description: Real-time status of batch video generation
      properties:
        batchVideoStatus:
          type: string
          enum: [idle, running, paused, completed, cancelled]
          description: Current queue status
        completedScenes:
          type: array
          items:
            type: integer
          description: Scene numbers that successfully generated
        failedScenes:
          type: array
          items:
            type: integer
          description: Scene numbers that failed
        activeScene:
          type: integer
          description: Scene currently being generated
        queueProgress:
          type: number
          minimum: 0
          maximum: 100
          description: Overall queue progress percentage
        estimatedRemainingTime:
          type: number
          description: Estimated remaining time in seconds
        sceneResults:
          type: object
          description: Per-scene results keyed by sceneNumber
          additionalProperties:
            type: object
            properties:
              videoStatus:
                type: string
              videoUrl:
                type: string
              videoProvider:
                type: string
              videoDuration:
                type: number
              generationTime:
                type: number
              generationError:
                type: string
      required:
        - batchVideoStatus
        - completedScenes
        - failedScenes
        - queueProgress

    BatchControlResponse:
      type: object
      description: Response from batch queue control operations (pause/resume/cancel)
      properties:
        success:
          type: boolean
        status:
          type: string
          enum: [idle, running, paused, completed, cancelled]
      required:
        - success
        - status

    # ─── Production Analytics ──────────────────────────────────────────────────
    SceneRenderAnalytics:
      type: object
      description: Per-scene render analytics
      properties:
        sceneNumber:
          type: integer
        hasImage:
          type: boolean
        hasVideo:
          type: boolean
        imageProvider:
          type: string
        videoProvider:
          type: string
        imageGenerationTime:
          type: number
        videoGenerationTime:
          type: number
        videoStatus:
          type: string
          enum: [success, error, processing, pending]
        imageStatus:
          type: string
          enum: [success, error, pending]
        generationError:
          type: string
      required:
        - sceneNumber
        - hasImage
        - hasVideo

    ProductionAnalytics:
      type: object
      description: Comprehensive production analytics for a storyboard
      properties:
        storyboardId:
          type: string
        totalScenes:
          type: integer
          description: Total number of scenes with generated assets
        renderProgress:
          type: number
          minimum: 0
          maximum: 100
          description: Percentage of scenes with successful video renders
        imageProgress:
          type: number
          minimum: 0
          maximum: 100
          description: Percentage of scenes with successful images
        estimatedRenderTime:
          type: number
          description: Estimated seconds to render remaining scenes (based on average generation time)
        averageVideoGenTime:
          type: number
          description: Average video generation time in seconds across successful renders
        averageImageGenTime:
          type: number
          description: Average image generation time in seconds across successful renders
        failedScenes:
          type: array
          items:
            type: integer
          description: Scene numbers that failed video generation
        failedImageScenes:
          type: array
          items:
            type: integer
          description: Scene numbers that failed image generation
        visualContinuityScore:
          type: number
          minimum: 0
          maximum: 100
          description: Score (0-100) measuring how consistently scenes have both image and video generated
        cinematicConsistencyScore:
          type: number
          minimum: 0
          maximum: 100
          description: Score (0-100) measuring provider consistency and generation quality across scenes
        exportDiagnostics:
          type: object
          description: Summary of export status
          properties:
            totalExports:
              type: integer
            completedExports:
              type: integer
            failedExports:
              type: integer
            processingExports:
              type: integer
            latestExportId:
              type: string
            latestExportStatus:
              type: string
            latestExportProgress:
              type: integer
          required:
            - totalExports
            - completedExports
            - failedExports
            - processingExports
        sceneAnalytics:
          type: array
          items:
            $ref: "#/components/schemas/SceneRenderAnalytics"
          description: Per-scene detailed analytics
        providerBreakdown:
          type: object
          description: Count of generated assets per provider
          additionalProperties:
            type: integer
        batchStatus:
          type: string
          enum: [idle, running, paused, completed, cancelled]
          description: Current or last batch generation status
        generatedAt:
          type: string
          description: ISO timestamp of when analytics were computed
      required:
        - storyboardId
        - totalScenes
        - renderProgress
        - imageProgress
        - estimatedRenderTime
        - averageVideoGenTime
        - averageImageGenTime
        - failedScenes
        - failedImageScenes
        - visualContinuityScore
        - cinematicConsistencyScore
        - exportDiagnostics
        - sceneAnalytics
        - providerBreakdown
        - generatedAt

    # ─── Image Generation Schemas ──────────────────────────────────────────────
    ImageProvider:
      type: string
      enum: [stability, openai, replicate, fal, pollinations]
      description: AI image generation provider

    ImageGenerationRequest:
      type: object
      description: Request to generate an image for a scene
      properties:
        storyboardId:
          type: string
          description: Storyboard identifier for asset persistence
        sceneNumber:
          type: integer
          description: Scene number to generate image for
        sceneImagePrompt:
          type: string
          description: Main image prompt from SceneImagePrompt.sceneImagePrompt
        provider:
          $ref: "#/components/schemas/ImageProvider"
        characterProfiles:
          type: array
          items:
            $ref: "#/components/schemas/CharacterProfile"
          description: Character profiles for reference locking
        characterVisualContinuity:
          type: string
          description: Per-character visual continuity state from SceneImagePrompt
        colorPalette:
          type: string
          description: Scene color palette
        cinematicMood:
          type: string
          description: Cinematic mood compound phrase
        renderStyle:
          type: string
          description: Render style specification
        visualEngine:
          type: string
          description: Visual engine applied (PresentEngine, FlashbackEngine, etc.)
      required:
        - sceneNumber
        - sceneImagePrompt

    ImageGenerationResult:
      type: object
      description: Result of an image generation request
      properties:
        imageStatus:
          type: string
          enum: [success, error]
          description: Generation status
        imageUrl:
          type: string
          description: URL of the generated image (present when imageStatus is success)
        imageProvider:
          $ref: "#/components/schemas/ImageProvider"
        generationTime:
          type: number
          description: Time taken to generate the image in seconds
        generationError:
          type: string
          description: Error message (present when imageStatus is error)
      required:
        - imageStatus
        - imageProvider
        - generationTime

    # ─── Asset Persistence ──────────────────────────────────────────────────────────
    SceneAsset:
      type: object
      description: Persisted generation asset for a single scene
      properties:
        sceneNumber:
          type: integer
        imageUrl:
          type: string
        imageProvider:
          type: string
        imageStatus:
          type: string
          enum: [success, error]
        videoUrl:
          type: string
        videoProvider:
          type: string
        videoStatus:
          type: string
          enum: [success, error, processing]
        videoDuration:
          type: integer
        generationTime:
          type: number
        generationProgress:
          type: number
          minimum: 0
          maximum: 100
          description: Generation progress percentage (0-100)
        generationError:
          type: string
        createdAt:
          type: string
      required:
        - sceneNumber

    SceneAssetList:
      type: object
      description: All persisted assets for a storyboard
      properties:
        storyboardId:
          type: string
        scenes:
          type: array
          items:
            $ref: "#/components/schemas/SceneAsset"
        batchQueue:
          $ref: "#/components/schemas/BatchQueueState"
      required:
        - storyboardId
        - scenes

    BatchQueueState:
      type: object
      description: Persisted batch queue state
      properties:
        status:
          type: string
          enum: [idle, running, paused, completed, cancelled]
        completedScenes:
          type: array
          items:
            type: integer
        failedScenes:
          type: array
          items:
            type: integer
        activeScene:
          type: integer
        queueProgress:
          type: integer
        estimatedRemainingTime:
          type: integer
        totalScenes:
          type: integer
        provider:
          type: string
        duration:
          type: integer
      required:
        - status

    # ─── Movie Export ──────────────────────────────────────────────────────────
    MovieExportFormat:
      type: string
      enum: [mp4, vertical_shorts, youtube, tiktok, cinematic_widescreen]
      description: Export format for assembled movie

    MovieExportRequest:
      type: object
      description: Request to assemble and export a movie from storyboard scenes
      properties:
        storyboardId:
          type: string
        format:
          $ref: "#/components/schemas/MovieExportFormat"
        sceneOrder:
          type: array
          items:
            type: integer
          description: Scene numbers in order to assemble
        transitionType:
          type: string
          enum: [cinematic_cut, dissolve, fade, dream_dissolve, flashback_blur, match_cut, whip_pan]
        subtitleConfig:
          type: object
          properties:
            enabled:
              type: boolean
            language:
              type: string
            style:
              type: string
        audioLayer:
          type: object
          properties:
            musicEnabled:
              type: boolean
            voiceEnabled:
              type: boolean
            effectsEnabled:
              type: boolean
      required:
        - storyboardId
        - format

    MovieExport:
      type: object
      description: Movie export status and result
      properties:
        exportId:
          type: string
        storyboardId:
          type: string
        format:
          $ref: "#/components/schemas/MovieExportFormat"
        status:
          type: string
          enum: [processing, completed, failed]
        exportUrl:
          type: string
        exportProgress:
          type: integer
          minimum: 0
          maximum: 100
        exportError:
          type: string
        fileSize:
          type: integer
        duration:
          type: integer
        createdAt:
          type: string
      required:
        - exportId
        - storyboardId
        - format
        - status

    # ─── Batch Image Generation Schemas ────────────────────────────────────────
    BatchImageSceneInput:
      type: object
      description: Per-scene input for batch image generation with continuity context
      properties:
        sceneNumber:
          type: integer
        sceneImagePrompt:
          type: string
        colorPalette:
          type: string
        cinematicMood:
          type: string
        renderStyle:
          type: string
        visualEngine:
          type: string
        characterVisualContinuity:
          type: string
        previousClothingState:
          type: array
          items:
            type: string
          description: Clothing state carried from previous scene for continuity
        previousLightingState:
          type: string
          description: Lighting state carried from previous scene
        previousWeatherState:
          type: string
          description: Weather state carried from previous scene
        previousEnvironmentState:
          type: string
          description: Environment state carried from previous scene
        previousEmotionalCarryOver:
          type: array
          items:
            type: string
          description: Emotional states carried from previous scene
        previousPoseContext:
          type: string
          description: Character pose context from previous scene for pose continuity
      required:
        - sceneNumber
        - sceneImagePrompt

    BatchImageGenerationRequest:
      type: object
      description: Request to batch generate images for all storyboard scenes sequentially
      properties:
        storyboardId:
          type: string
        scenes:
          type: array
          items:
            $ref: "#/components/schemas/BatchImageSceneInput"
        provider:
          $ref: "#/components/schemas/ImageProvider"
        characterProfiles:
          type: array
          items:
            $ref: "#/components/schemas/CharacterProfile"
      required:
        - scenes

    BatchImageGenerationStatus:
      type: object
      description: Real-time status of batch image generation
      properties:
        batchGenerationStatus:
          type: string
          enum: [idle, running, completed, cancelled, failed]
          description: Current queue status
        completedScenes:
          type: array
          items:
            type: integer
          description: Scene numbers that successfully generated
        failedScenes:
          type: array
          items:
            type: integer
          description: Scene numbers that failed
        queuedScenes:
          type: array
          items:
            type: integer
          description: Scene numbers waiting in queue
        activeScene:
          type: integer
          description: Scene currently being generated
        queueProgress:
          type: number
          minimum: 0
          maximum: 100
          description: Overall queue progress percentage
        estimatedTimeRemaining:
          type: number
          description: Estimated remaining time in seconds
        sceneResults:
          type: object
          description: Per-scene results keyed by sceneNumber
          additionalProperties:
            type: object
            properties:
              imageStatus:
                type: string
              imageUrl:
                type: string
              imageProvider:
                type: string
              generationTime:
                type: number
              generationError:
                type: string
      required:
        - batchGenerationStatus
        - completedScenes
        - failedScenes
        - queuedScenes
        - queueProgress

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
