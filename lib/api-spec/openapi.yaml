openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: storyboard
    description: DreamFrame AI storyboard operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /storyboard/analyze:
    post:
      operationId: analyzeStory
      tags: [storyboard]
      summary: Analyze a story and generate storyboard scenes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoryInput"
      responses:
        "200":
          description: Storyboard with scenes and characters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Storyboard"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    StoryInput:
      type: object
      properties:
        story:
          type: string
          minLength: 10
        outputLanguage:
          type: string
          enum: [en, si, ta]
          default: en
      required:
        - story
    CharacterProfile:
      type: object
      properties:
        characterId:
          type: string
        name:
          type: string
        species:
          type: string
        appearance:
          type: string
        clothing:
          type: string
        personality:
          type: string
        distinctiveFeatures:
          type: string
      required:
        - characterId
        - name
        - species
        - appearance
        - personality
        - distinctiveFeatures
    InternalThought:
      type: object
      properties:
        character:
          type: string
        thought:
          type: string
      required:
        - character
        - thought
    Scene:
      type: object
      properties:
        sceneNumber:
          type: integer
        title:
          type: string
        description:
          type: string
        characters:
          type: array
          items:
            type: string
        visualPrompt:
          type: string
        thoughts:
          type: array
          items:
            $ref: "#/components/schemas/InternalThought"
      required:
        - sceneNumber
        - title
        - description
        - characters
        - visualPrompt
        - thoughts
    Storyboard:
      type: object
      properties:
        title:
          type: string
        characters:
          type: array
          items:
            $ref: "#/components/schemas/CharacterProfile"
        scenes:
          type: array
          items:
            $ref: "#/components/schemas/Scene"
      required:
        - title
        - characters
        - scenes
    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
