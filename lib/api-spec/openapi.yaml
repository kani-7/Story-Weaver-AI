openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: storyboard
    description: DreamFrame AI storyboard operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /storyboard/generate-video:
    post:
      operationId: generateSceneVideo
      tags: [storyboard]
      summary: Generate an AI video clip for a storyboard scene
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VideoGenerationRequest"
      responses:
        "200":
          description: Video generation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoGenerationResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /storyboard/generate-image:
    post:
      operationId: generateSceneImage
      tags: [storyboard]
      summary: Generate an AI image for a storyboard scene
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImageGenerationRequest"
      responses:
        "200":
          description: Image generation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageGenerationResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /storyboard/assets:
    get:
      operationId: getStoryboardAssets
      tags: [storyboard]
      summary: Get all persisted assets for a storyboard
      parameters:
        - name: storyboardId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Persisted scene assets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SceneAssetList"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /storyboard/batch-status:
    get:
      operationId: getBatchStatus
      tags: [storyboard]
      summary: Get persisted batch queue status
      parameters:
        - name: storyboardId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Batch queue state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchQueueState"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /storyboard/movie-export:
    post:
      operationId: createMovieExport
      tags: [storyboard]
      summary: Create a movie export from storyboard scenes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MovieExportRequest"
      responses:
        "200":
          description: Export created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieExport"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /storyboard/analyze:
    post:
      operationId: analyzeStory
      tags: [storyboard]
      summary: Analyze a story and generate storyboard scenes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoryInput"
      responses:
        "200":
          description: Storyboard with scenes and characters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Storyboard"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /storyboard/batch-generate-videos:
    post:
      operationId: batchGenerateVideos
      tags: [storyboard]
      summary: Batch generate cinematic video clips for all storyboard scenes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchVideoGenerationRequest"
      responses:
        "200":
          description: Batch video generation status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchVideoGenerationStatus"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    StoryInput:
      type: object
      properties:
        story:
          type: string
          minLength: 10
        outputLanguage:
          type: string
          enum: [en, si, ta]
          default: en
      required:
        - story

    # ─── Scene Type ────────────────────────────────────────────────────────────
    SceneType:
      type: string
      enum: [Present, Flashback, Dream, Imagination]

    # ─── Character Schemas ─────────────────────────────────────────────────────
    CharacterProfile:
      type: object
      properties:
        characterId:
          type: string
          description: English lowercase hyphenated slug, unique across all characters
        name:
          type: string
          description: Character name in the output language
        species:
          type: string
          description: Species or archetype in the output language
        appearance:
          type: string
          description: 3-4 sentences describing the character visually
        clothing:
          type: string
          description: Garments, accessories, footwear in the output language. "—" if none.
        personality:
          type: string
          description: 2-3 sentences covering motivation, baseline, and behavioral tell
        distinctiveFeatures:
          type: string
          description: 2-4 precise, artist-reproducible visual markers
        voiceStyle:
          type: string
          description: "English only. One sentence: pitch, tempo, texture, accent, delivery style."
      required:
        - characterId
        - name
        - species
        - appearance
        - personality
        - distinctiveFeatures

    # ─── Story Layer Schemas ───────────────────────────────────────────────────
    InternalThought:
      type: object
      properties:
        character:
          type: string
        thought:
          type: string
      required:
        - character
        - thought

    DialogueLine:
      type: object
      description: A single spoken line with full voice performance metadata
      properties:
        character:
          type: string
          description: Exact character name from profile
        line:
          type: string
          description: Spoken words only, no quotation marks
        vocalEmotion:
          type: string
          description: "English only. The emotional quality of the voice delivery (e.g. sadness, joy, anger, fear, contempt, relief, determination)"
        vocalIntensity:
          type: number
          minimum: 0
          maximum: 1
          description: "Float 0.00–1.00. 0.90–1.00 = peak intensity, 0.60–0.89 = elevated, 0.30–0.59 = moderate, 0.00–0.29 = subdued"
        speechSpeed:
          type: string
          enum: [slow, normal, fast]
          description: "English only. Pace of delivery."
        pauseTiming:
          type: string
          description: "English only. Pause quality before or within the line (e.g. dramatic pause, hesitant, no pause, long silence before)"
        whisperDetection:
          type: boolean
          description: True if the line is delivered as a whisper
        shoutDetection:
          type: boolean
          description: True if the line is delivered as a shout or raised voice
      required:
        - character
        - line

    InternalMonologueLine:
      type: object
      properties:
        character:
          type: string
          description: Exact character name from profile
        monologue:
          type: string
          description: Extended inner voice passage, may be fragmented
      required:
        - character
        - monologue

    CharacterAction:
      type: object
      properties:
        character:
          type: string
          description: Named character only — never "Narrator"
        action:
          type: string
          description: Concise present-tense physical action
      required:
        - character
        - action

    CharacterEmotion:
      type: object
      properties:
        character:
          type: string
          description: Exact character name from profile
        emotion:
          type: string
          description: Short, precise emotional state label
        confidence:
          type: number
          minimum: 0
          maximum: 1
          description: "Float 0.00–1.00: 0.90–1.00 explicit, 0.60–0.89 implied, 0.30–0.59 inferred"
      required:
        - character
        - emotion
        - confidence

    # ─── Audio Schema ──────────────────────────────────────────────────────────
    SceneAudio:
      type: object
      properties:
        backgroundAmbience:
          type: array
          items:
            type: string
          description: 2-5 continuous environmental sound descriptions (English only)
        backgroundMusic:
          type: string
          description: Tempo, instrumentation, emotional tone, genre reference (English only)
        soundEffects:
          type: array
          items:
            type: string
          description: 1-6 event-triggered sound effects (English only)
      required:
        - backgroundAmbience
        - backgroundMusic
        - soundEffects

    # ─── Continuity Schema ─────────────────────────────────────────────────────
    ContinuityStatus:
      type: string
      enum: [Pass, Warning, Fail]

    SceneContinuityCheck:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/ContinuityStatus"
        issues:
          type: array
          items:
            type: string
          description: List of continuity issues. Empty if status is Pass.
      required:
        - status
        - issues

    # ─── Scene Memory Engine ───────────────────────────────────────────────────
    SceneContinuityMemory:
      type: object
      description: Persistent state memory tracked from previous scenes for continuity enforcement
      properties:
        clothingState:
          type: array
          items:
            type: string
          description: "English only. Current clothing/costume state of each character present (e.g. 'Kael: torn jacket, missing left glove')"
        weatherState:
          type: string
          description: "English only. Current weather conditions carried from previous scenes"
        environmentState:
          type: string
          description: "English only. Current environment and location state"
        objectsPresent:
          type: array
          items:
            type: string
          description: "English only. Key props and objects present and their state"
        injuryState:
          type: array
          items:
            type: string
          description: "English only. Any injuries or physical damage carried from prior scenes"
        emotionalCarryOver:
          type: array
          items:
            type: string
          description: "English only. Emotional states or unresolved tensions carried into this scene"
        lightingState:
          type: string
          description: "English only. Current ambient lighting conditions"
        timeOfDay:
          type: string
          description: "English only. Time of day continuity (e.g. dusk, night, early morning)"
        continuityWarnings:
          type: array
          items:
            type: string
          description: "English only. Specific continuity violations or risks detected in this scene"
        continuityResolutionSuggestions:
          type: array
          items:
            type: string
          description: "English only. Director suggestions to resolve or address continuity warnings"
      required:
        - clothingState
        - weatherState
        - environmentState
        - objectsPresent
        - injuryState
        - emotionalCarryOver
        - lightingState
        - timeOfDay
        - continuityWarnings
        - continuityResolutionSuggestions

    # ─── Cinematic Camera System ───────────────────────────────────────────────
    CinematicCamera:
      type: object
      description: Structured cinematic camera direction for the scene (English only)
      properties:
        shotType:
          type: string
          description: "Primary shot type: Close-up | Medium Shot | Wide Shot | Extreme Wide Shot | POV Shot | Tracking Shot"
        cameraAngle:
          type: string
          description: "Camera angle: Low Angle | High Angle | Eye Level | Dutch Angle | Over-the-Shoulder"
        cameraMovement:
          type: string
          description: "Camera movement: Static | Dolly In | Dolly Out | Crane Up | Handheld | Tracking | Orbit"
        lensStyle:
          type: string
          description: "Lens style: 35mm cinematic | 50mm portrait | ultra wide | telephoto compression"
        framingStyle:
          type: string
          description: "English only. Framing composition note (e.g. rule of thirds, centered symmetry, negative space)"
        lightingStyle:
          type: string
          description: "English only. Lighting mood and direction (e.g. cinematic glow, storm shadows, warm sunrise, moody contrast)"
        pacingStyle:
          type: string
          description: "English only. Editorial pacing feel (e.g. emotional slow pacing, tension pacing, dream pacing)"
      required:
        - shotType
        - cameraAngle
        - cameraMovement
        - lensStyle
        - framingStyle
        - lightingStyle
        - pacingStyle

    # ─── Storyboard Shotlist Engine ────────────────────────────────────────────
    ShotListItem:
      type: object
      description: A single production shot entry in the scene shotlist (English only)
      properties:
        shotNumber:
          type: integer
          description: Shot number within the scene, starting from 1
        shotDescription:
          type: string
          description: "English only. Concise visual description of what the camera captures"
        shotPurpose:
          type: string
          description: "English only. Narrative or emotional purpose of this shot"
        estimatedDuration:
          type: string
          description: "English only. Estimated screen time (e.g. 3 seconds, 8–12 seconds)"
        transitionType:
          type: string
          description: "Transition into the next shot: Fade In | Fade Out | Dissolve | Match Cut | Hard Cut | Iris Transition | Dream Ripple"
      required:
        - shotNumber
        - shotDescription
        - shotPurpose
        - estimatedDuration
        - transitionType

    # ─── Cinematic Tension Analysis ────────────────────────────────────────────
    TensionAnalysis:
      type: object
      description: Emotional and cinematic tension tracking for the scene (English only)
      properties:
        tensionCurve:
          type: string
          description: "English only. Description of the tension arc within this scene (e.g. builds steadily, sharp spike at midpoint, slow release)"
        emotionalIntensity:
          type: number
          minimum: 0
          maximum: 1
          description: "Float 0.00–1.00. Overall emotional intensity of the scene relative to the full story"
        pacingBalance:
          type: string
          description: "English only. Editorial pacing assessment (e.g. well-balanced, front-loaded tension, needs breathing room)"
      required:
        - tensionCurve
        - emotionalIntensity
        - pacingBalance

    # ─── Production Assessment Schemas ────────────────────────────────────────
    MovieReadinessReport:
      type: object
      properties:
        strengths:
          type: array
          items:
            type: string
          description: 2-5 specific strengths of this story as a film project
        weaknesses:
          type: array
          items:
            type: string
          description: 1-4 specific weaknesses or underdeveloped elements
        missingElements:
          type: array
          items:
            type: string
          description: 0-3 story elements that would strengthen the film but are absent
        productionNotes:
          type: string
          description: English only. 2-4 sentence paragraph of practical production advice.
      required:
        - strengths
        - weaknesses
        - missingElements
        - productionNotes

    # ─── Export Preparation System ─────────────────────────────────────────────
    ExportReadiness:
      type: object
      description: Pipeline readiness assessment for downstream production export
      properties:
        screenplayReady:
          type: boolean
          description: True if dialogue, narration, and scene structure are complete enough for screenplay formatting
        storyboardReady:
          type: boolean
          description: True if visual prompts and shot lists are complete enough for storyboard rendering
        animationPipelineReady:
          type: boolean
          description: True if character profiles and visual prompts meet animation pre-production standards
        voicePipelineReady:
          type: boolean
          description: True if dialogue and voice metadata are complete enough for voice direction and dubbing
        editingPipelineReady:
          type: boolean
          description: True if shotlists and transition types are complete enough for editorial planning
      required:
        - screenplayReady
        - storyboardReady
        - animationPipelineReady
        - voicePipelineReady
        - editingPipelineReady

    # ─── Scene Image Prompt ────────────────────────────────────────────────────
    SceneImagePrompt:
      type: object
      description: Platform-neutral image generation prompt for this scene (all fields English only)
      properties:
        sceneImagePrompt:
          type: string
          description: "English only. Full platform-neutral image prompt (80-150 words) compatible with Midjourney, Stable Diffusion, DALL-E, Flux, Leonardo AI, Runway, Kling, Veo."
        colorPalette:
          type: string
          description: "English only. Specific color palette for this scene"
        environmentDetail:
          type: string
          description: "English only. Detailed environment and setting description"
        characterPositioning:
          type: string
          description: "English only. Exact character positions, poses, and spatial relationships"
        facialExpressionDetail:
          type: string
          description: "English only. Per-character facial expression descriptions"
        cinematicMood:
          type: string
          description: "English only. Overall emotional and visual mood compound phrase"
        visualEffects:
          type: array
          items:
            type: string
          description: "English only. Specific visual effects to apply in image generation"
        renderStyle:
          type: string
          description: "English only. Render style specification"
        animationStyle:
          type: string
          description: "English only. Animation movement and style guidance"
        visualEngine:
          type: string
          enum: [PresentEngine, FlashbackEngine, DreamEngine, ImaginationEngine]
          description: Scene-type visual engine applied
        characterVisualContinuity:
          type: string
          description: "English only. Per-character visual continuity state (clothing condition, injury, wetness, emotional carry-over from previous scene)"
      required:
        - sceneImagePrompt
        - colorPalette
        - environmentDetail
        - characterPositioning
        - facialExpressionDetail
        - cinematicMood
        - visualEffects
        - renderStyle
        - animationStyle
        - visualEngine
        - characterVisualContinuity

    # ─── Storyboard Frame Metadata ─────────────────────────────────────────────
    StoryboardFrameMetadata:
      type: object
      description: Technical frame metadata for storyboard rendering (all fields English only)
      properties:
        aspectRatio:
          type: string
          description: "English only. Suggested aspect ratio (e.g. '2.39:1 CinemaScope', '16:9 Widescreen', '1.85:1 Theatrical')"
        focalLength:
          type: string
          description: "English only. Suggested focal length (e.g. '28mm ultra wide', '85mm portrait', '200mm telephoto compression')"
        depthOfField:
          type: string
          description: "English only. Depth of field specification (e.g. 'shallow — subject sharp, background soft bokeh at f/1.8')"
        lensStyle:
          type: string
          description: "English only. Lens rendering style (e.g. 'anamorphic — oval bokeh and horizontal flares', 'vintage — edge softness and vignette')"
        cinematicCompositionNotes:
          type: string
          description: "English only. Specific composition instructions for the image artist"
      required:
        - aspectRatio
        - focalLength
        - depthOfField
        - lensStyle
        - cinematicCompositionNotes

    # ─── Visual Production Report ─────────────────────────────────────────────
    VisualProductionReport:
      type: object
      description: Visual production assessment and recommendations (all fields English only)
      properties:
        strongestVisualScenes:
          type: array
          items:
            type: string
          description: "English only. Scene identifiers with strongest visual generation potential"
        weakestVisualScenes:
          type: array
          items:
            type: string
          description: "English only. Scene identifiers with weakest visual execution or lowest generation confidence"
        consistencyRisks:
          type: array
          items:
            type: string
          description: "English only. Specific visual consistency risks across scenes"
        animationComplexityNotes:
          type: array
          items:
            type: string
          description: "English only. Per-scene or per-character animation complexity notes"
        renderingDifficultyNotes:
          type: array
          items:
            type: string
          description: "English only. Rendering difficulty and resource intensity notes per scene"
        cinematicStrengths:
          type: array
          items:
            type: string
          description: "English only. Overall cinematic strengths for visual production"
      required:
        - strongestVisualScenes
        - weakestVisualScenes
        - consistencyRisks
        - animationComplexityNotes
        - renderingDifficultyNotes
        - cinematicStrengths

    # ─── Scene Schema ──────────────────────────────────────────────────────────
    Scene:
      type: object
      properties:
        sceneNumber:
          type: integer
          description: Sequential scene number starting from 1
        sceneType:
          $ref: "#/components/schemas/SceneType"
          default: Present
        title:
          type: string
          description: Short scene title in output language
        description:
          type: string
          description: 2-3 sentence scene description in output language
        characters:
          type: array
          items:
            type: string
          description: Character names exactly as in their profiles
        visualPrompt:
          type: string
          description: "English only. 40-80 words. Vivid 3D cartoon production prompt referencing distinctiveFeatures."
        narration:
          type: array
          items:
            type: string
          default: []
          description: External narrator passages in output language
        dialogue:
          type: array
          items:
            $ref: "#/components/schemas/DialogueLine"
          default: []
          description: Audible spoken dialogue with full voice performance metadata
        thoughts:
          type: array
          items:
            $ref: "#/components/schemas/InternalThought"
          default: []
          description: Brief reactive private reflections
        internalMonologue:
          type: array
          items:
            $ref: "#/components/schemas/InternalMonologueLine"
          default: []
          description: Extended inner voice stream-of-consciousness passages
        actions:
          type: array
          items:
            $ref: "#/components/schemas/CharacterAction"
          default: []
          description: Physical actions by named characters only
        emotions:
          type: array
          items:
            $ref: "#/components/schemas/CharacterEmotion"
          default: []
          description: Detected emotional states with confidence scores
        audio:
          $ref: "#/components/schemas/SceneAudio"
        continuityCheck:
          $ref: "#/components/schemas/SceneContinuityCheck"
        continuityMemory:
          $ref: "#/components/schemas/SceneContinuityMemory"
        cinematicCamera:
          $ref: "#/components/schemas/CinematicCamera"
        shotList:
          type: array
          items:
            $ref: "#/components/schemas/ShotListItem"
          description: Production-ready shotlist for the scene (English only)
        tensionAnalysis:
          $ref: "#/components/schemas/TensionAnalysis"
        imagePrompt:
          $ref: "#/components/schemas/SceneImagePrompt"
        storyboardFrameMetadata:
          $ref: "#/components/schemas/StoryboardFrameMetadata"
        flashbackVisualStyle:
          type: string
          description: "Flashback scenes only. English only. Color grade, film treatment, camera characteristics."
        flashbackAudioStyle:
          type: string
          description: "Flashback scenes only. English only. Audio treatment suggesting memory."
        dreamVisualStyle:
          type: string
          description: "Dream scenes only. English only. Visual treatment distinguishing dream from reality."
        dreamAudioStyle:
          type: string
          description: "Dream scenes only. English only. Audio treatment inside the dream."
        flashbackIndicator:
          type: string
          description: "Flashback/Dream/Imagination only. English on-screen text card. Under 6 words."
        transitionInstructions:
          type: string
          description: "Flashback/Dream/Imagination only. English only. Cinematic entry technique."
        returnToPresentInstructions:
          type: string
          description: "Flashback/Dream/Imagination only. English only. Cinematic exit technique."
      required:
        - sceneNumber
        - sceneType
        - title
        - description
        - characters
        - visualPrompt
        - narration
        - dialogue
        - thoughts
        - internalMonologue
        - actions
        - emotions

    # ─── Storyboard Schema ─────────────────────────────────────────────────────
    Storyboard:
      type: object
      properties:
        storyboardId:
          type: string
          description: Unique identifier for storyboard asset persistence
        title:
          type: string
          description: Short cinematic title in output language
        characters:
          type: array
          items:
            $ref: "#/components/schemas/CharacterProfile"
        scenes:
          type: array
          items:
            $ref: "#/components/schemas/Scene"
        productionReadinessScore:
          type: integer
          minimum: 0
          maximum: 100
          description: "Overall production readiness: 90-100 festival-ready, 70-89 solid draft, 50-69 promising, <50 needs development"
        movieReadinessReport:
          $ref: "#/components/schemas/MovieReadinessReport"
        exportReadiness:
          $ref: "#/components/schemas/ExportReadiness"
        imageGenerationScore:
          type: integer
          minimum: 0
          maximum: 100
          description: "Overall image generation readiness score 0-100. 90-100: all scenes fully prompt-ready; 70-89: minor gaps; 50-69: moderate; <50: significant gaps"
        visualProductionReport:
          $ref: "#/components/schemas/VisualProductionReport"
      required:
        - title
        - characters
        - scenes

    # ─── Video Generation Schemas ──────────────────────────────────────────────
    VideoProvider:
      type: string
      enum: [runway, kling, luma, pika, haiper, stability, pixverse]
      description: AI video generation provider

    VideoGenerationRequest:
      type: object
      description: Request to generate a video clip for a scene
      properties:
        storyboardId:
          type: string
          description: Storyboard identifier for asset persistence
        sceneNumber:
          type: integer
          description: Scene number to generate video for
        videoPrompt:
          type: string
          description: Main video generation prompt
        provider:
          $ref: "#/components/schemas/VideoProvider"
        imageUrl:
          type: string
          description: Optional first-frame image URL (from image generation)
        duration:
          type: integer
          enum: [5, 10]
          default: 5
          description: Clip duration in seconds
        characterProfiles:
          type: array
          items:
            $ref: "#/components/schemas/CharacterProfile"
          description: Character profiles for continuity locking
        characterVisualContinuity:
          type: string
          description: Per-character visual continuity state
        cameraMovement:
          type: string
          description: Camera movement instruction from cinematicCamera
        cinematicMood:
          type: string
          description: Cinematic mood compound phrase
        lightingStyle:
          type: string
          description: Lighting mood and direction
        animationStyle:
          type: string
          description: Animation movement and style guidance
        dominantEmotion:
          type: string
          description: Primary emotional tone of the scene
        emotionalIntensity:
          type: number
          minimum: 0
          maximum: 1
          description: Emotional intensity level
        shotType:
          type: string
          description: Primary shot type
        pacingStyle:
          type: string
          description: Editorial pacing feel
        characterMovements:
          type: array
          items:
            type: string
          description: Per-character action descriptions for motion direction
        environmentalMotion:
          type: string
          description: Environmental and weather motion description
        cinematicTransition:
          type: string
          description: Transition type for the clip
        clothingState:
          type: array
          items:
            type: string
          description: Current clothing state per character for visual continuity
        lightingState:
          type: string
          description: Current lighting state carried from previous scenes
        environmentState:
          type: string
          description: Current environment state
        emotionalCarryOver:
          type: array
          items:
            type: string
          description: Emotional states carried into this scene
      required:
        - sceneNumber
        - videoPrompt

    VideoGenerationResult:
      type: object
      description: Result of a video generation request
      properties:
        videoStatus:
          type: string
          enum: [success, error, processing]
          description: Generation status
        videoUrl:
          type: string
          description: URL of the generated video (present when videoStatus is success)
        videoProvider:
          $ref: "#/components/schemas/VideoProvider"
        videoDuration:
          type: number
          description: Actual clip duration in seconds
        generationTime:
          type: number
          description: Time taken to generate the video in seconds
        generationProgress:
          type: number
          minimum: 0
          maximum: 100
          description: Generation progress percentage (0-100)
        generationError:
          type: string
          description: Error message (present when videoStatus is error)
      required:
        - videoStatus
        - videoProvider
        - videoDuration
        - generationTime
        - generationProgress

    # ─── Batch Video Generation Schemas ─────────────────────────────────────────
    BatchVideoGenerationRequest:
      type: object
      description: Request to batch generate videos for all storyboard scenes
      properties:
        storyboardId:
          type: string
          description: Storyboard identifier for asset persistence
        scenes:
          type: array
          items:
            type: object
            properties:
              sceneNumber:
                type: integer
              videoPrompt:
                type: string
              imageUrl:
                type: string
              characterProfiles:
                type: array
                items:
                  $ref: "#/components/schemas/CharacterProfile"
              characterVisualContinuity:
                type: string
              cameraMovement:
                type: string
              cinematicMood:
                type: string
              lightingStyle:
                type: string
              animationStyle:
                type: string
              dominantEmotion:
                type: string
              emotionalIntensity:
                type: number
              shotType:
                type: string
              pacingStyle:
                type: string
              characterMovements:
                type: array
                items:
                  type: string
              environmentalMotion:
                type: string
              cinematicTransition:
                type: string
              clothingState:
                type: array
                items:
                  type: string
              lightingState:
                type: string
              environmentState:
                type: string
              emotionalCarryOver:
                type: array
                items:
                  type: string
              previousCameraMovement:
                type: string
              previousEmotionalState:
                type: string
              previousVisualPalette:
                type: string
              previousEnvironmentState:
                type: string
              transitionType:
                type: string
                enum: [fade, dissolve, whip_pan, cinematic_cut, dream_dissolve, flashback_blur, match_cut]
            required:
              - sceneNumber
              - videoPrompt
          description: Array of scene data for sequential generation
        provider:
          $ref: "#/components/schemas/VideoProvider"
        duration:
          type: integer
          enum: [5, 10]
          default: 5
      required:
        - scenes

    BatchVideoGenerationStatus:
      type: object
      description: Real-time status of batch video generation
      properties:
        batchVideoStatus:
          type: string
          enum: [idle, running, paused, completed, cancelled]
          description: Current queue status
        completedScenes:
          type: array
          items:
            type: integer
          description: Scene numbers that successfully generated
        failedScenes:
          type: array
          items:
            type: integer
          description: Scene numbers that failed
        activeScene:
          type: integer
          description: Scene currently being generated
        queueProgress:
          type: number
          minimum: 0
          maximum: 100
          description: Overall queue progress percentage
        estimatedRemainingTime:
          type: number
          description: Estimated remaining time in seconds
        sceneResults:
          type: object
          description: Per-scene results keyed by sceneNumber
          additionalProperties:
            type: object
            properties:
              videoStatus:
                type: string
              videoUrl:
                type: string
              videoProvider:
                type: string
              videoDuration:
                type: number
              generationTime:
                type: number
              generationError:
                type: string
      required:
        - batchVideoStatus
        - completedScenes
        - failedScenes
        - queueProgress

    # ─── Image Generation Schemas ──────────────────────────────────────────────
    ImageProvider:
      type: string
      enum: [stability, openai, replicate, fal, pollinations]
      description: AI image generation provider

    ImageGenerationRequest:
      type: object
      description: Request to generate an image for a scene
      properties:
        storyboardId:
          type: string
          description: Storyboard identifier for asset persistence
        sceneNumber:
          type: integer
          description: Scene number to generate image for
        sceneImagePrompt:
          type: string
          description: Main image prompt from SceneImagePrompt.sceneImagePrompt
        provider:
          $ref: "#/components/schemas/ImageProvider"
        characterProfiles:
          type: array
          items:
            $ref: "#/components/schemas/CharacterProfile"
          description: Character profiles for reference locking
        characterVisualContinuity:
          type: string
          description: Per-character visual continuity state from SceneImagePrompt
        colorPalette:
          type: string
          description: Scene color palette
        cinematicMood:
          type: string
          description: Cinematic mood compound phrase
        renderStyle:
          type: string
          description: Render style specification
        visualEngine:
          type: string
          description: Visual engine applied (PresentEngine, FlashbackEngine, etc.)
      required:
        - sceneNumber
        - sceneImagePrompt

    ImageGenerationResult:
      type: object
      description: Result of an image generation request
      properties:
        imageStatus:
          type: string
          enum: [success, error]
          description: Generation status
        imageUrl:
          type: string
          description: URL of the generated image (present when imageStatus is success)
        imageProvider:
          $ref: "#/components/schemas/ImageProvider"
        generationTime:
          type: number
          description: Time taken to generate the image in seconds
        generationError:
          type: string
          description: Error message (present when imageStatus is error)
      required:
        - imageStatus
        - imageProvider
        - generationTime

    # ─── Asset Persistence ──────────────────────────────────────────────────────────
    SceneAsset:
      type: object
      description: Persisted generation asset for a single scene
      properties:
        sceneNumber:
          type: integer
        imageUrl:
          type: string
        imageProvider:
          type: string
        imageStatus:
          type: string
          enum: [success, error]
        videoUrl:
          type: string
        videoProvider:
          type: string
        videoStatus:
          type: string
          enum: [success, error, processing]
        videoDuration:
          type: integer
        generationTime:
          type: number
        generationProgress:
          type: number
          minimum: 0
          maximum: 100
          description: Generation progress percentage (0-100)
        generationError:
          type: string
        createdAt:
          type: string
      required:
        - sceneNumber

    SceneAssetList:
      type: object
      description: All persisted assets for a storyboard
      properties:
        storyboardId:
          type: string
        scenes:
          type: array
          items:
            $ref: "#/components/schemas/SceneAsset"
        batchQueue:
          $ref: "#/components/schemas/BatchQueueState"
      required:
        - storyboardId
        - scenes

    BatchQueueState:
      type: object
      description: Persisted batch queue state
      properties:
        status:
          type: string
          enum: [idle, running, paused, completed, cancelled]
        completedScenes:
          type: array
          items:
            type: integer
        failedScenes:
          type: array
          items:
            type: integer
        activeScene:
          type: integer
        queueProgress:
          type: integer
        estimatedRemainingTime:
          type: integer
        totalScenes:
          type: integer
        provider:
          type: string
        duration:
          type: integer
      required:
        - status

    # ─── Movie Export ──────────────────────────────────────────────────────────
    MovieExportFormat:
      type: string
      enum: [mp4, vertical_shorts, youtube, tiktok, cinematic_widescreen]
      description: Export format for assembled movie

    MovieExportRequest:
      type: object
      description: Request to assemble and export a movie from storyboard scenes
      properties:
        storyboardId:
          type: string
        format:
          $ref: "#/components/schemas/MovieExportFormat"
        sceneOrder:
          type: array
          items:
            type: integer
          description: Scene numbers in order to assemble
        transitionType:
          type: string
          enum: [cinematic_cut, dissolve, fade, dream_dissolve, flashback_blur, match_cut, whip_pan]
        subtitleConfig:
          type: object
          properties:
            enabled:
              type: boolean
            language:
              type: string
            style:
              type: string
        audioLayer:
          type: object
          properties:
            musicEnabled:
              type: boolean
            voiceEnabled:
              type: boolean
            effectsEnabled:
              type: boolean
      required:
        - storyboardId
        - format

    MovieExport:
      type: object
      description: Movie export status and result
      properties:
        exportId:
          type: string
        storyboardId:
          type: string
        format:
          $ref: "#/components/schemas/MovieExportFormat"
        status:
          type: string
          enum: [processing, completed, failed]
        exportUrl:
          type: string
        exportProgress:
          type: integer
          minimum: 0
          maximum: 100
        exportError:
          type: string
        fileSize:
          type: integer
        duration:
          type: integer
        createdAt:
          type: string
      required:
        - exportId
        - storyboardId
        - format
        - status

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
